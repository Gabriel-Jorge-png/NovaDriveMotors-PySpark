services:
  spark-master:
    build: .
    container_name: spark-master
    env_file:
      - .env
    environment:
      - SPARK_NO_DAEMONIZE=true
      - SPARK_CLASSPATH=/opt/spark/jars-extra/postgresql-42.7.9.jar
    ports:
      - "8080:8080"
      - "7077:7077"
      - "4040:4040"
    volumes:
      - ./apps:/app/apps
      - ./data:/app/data
      - ./output:/app/output
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master

  spark-worker:
    build: .
    container_name: spark-worker
    depends_on:
      - spark-master
    env_file:
      - .env
    environment:
      - SPARK_NO_DAEMONIZE=true
      - SPARK_CLASSPATH=/opt/spark/jars-extra/postgresql-42.7.9.jar
    ports:
      - "8081:8081"
    volumes:
      - ./apps:/app/apps
      - ./data:/app/data
      - ./output:/app/output
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077